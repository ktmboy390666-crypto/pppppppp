<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>স্মার্ট খামার - এডমিন প্যানেল</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Bengali:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        body { font-family: 'Noto Sans Bengali', sans-serif; background-color: #f4f7f6; }
        
        /* Scrolling Text Animation */
        .scrolling-wrapper { overflow: hidden; white-space: nowrap; border-radius: 0.75rem; }
        .scrolling-wrapper span { display: inline-block; padding-left: 100%; animation: scroll-left 15s linear infinite; }
        @keyframes scroll-left { 0% { transform: translateX(0%); } 100% { transform: translateX(-100%); } }
        
        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-800 pb-20">

    <header class="bg-gradient-to-r from-teal-800 to-teal-600 text-white p-6 shadow-lg rounded-b-3xl mb-6 sticky top-0 z-20">
        <div class="max-w-3xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span class="material-symbols-outlined text-3xl">admin_panel_settings</span> 
                এডমিন প্যানেল
            </h1>
            <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-bold backdrop-blur-sm shadow-sm">Shuvo All Tool</span>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-4 space-y-6">
        
        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 transition hover:shadow-md">
            <h2 class="text-lg font-bold text-teal-700 mb-4 flex items-center gap-2">
                <span class="material-symbols-outlined">campaign</span> স্ক্রলিং মেসেজ আপডেট
            </h2>
            
            <div class="scrolling-wrapper bg-teal-50 text-teal-800 font-bold py-3 px-4 mb-4 border-l-4 border-teal-500 shadow-inner">
                <span id="scrollText">📌 লোড হচ্ছে...</span>
            </div>

            <div class="flex gap-2">
                <input type="text" id="scrollInput" placeholder="নতুন মেসেজ লিখুন..." class="flex-grow p-4 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-teal-500 font-medium text-sm">
                <button id="updateScroll" class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-4 rounded-2xl font-bold transition shadow-md active:scale-95">আপডেট</button>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 transition hover:shadow-md relative overflow-hidden">
            <div class="absolute -right-10 -top-10 w-32 h-32 bg-teal-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

            <h2 class="text-xl font-bold text-teal-700 mb-5 flex items-center gap-2" id="form-title">
                <span class="material-symbols-outlined text-2xl">add_circle</span> নতুন ওষুধ যোগ করুন
            </h2>
            
            <form id="medicineForm" class="space-y-5 relative z-10">
                <div class="bg-blue-50/50 p-4 rounded-2xl border border-blue-100">
                    <label class="block text-blue-800 font-bold mb-2 text-sm ml-1">মুরগির জাত নির্বাচন করুন:</label>
                    <select id="birdType" class="w-full p-4 bg-white border border-blue-200 rounded-xl font-bold text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm" required>
                        <option value="ব্রয়লার">🐔 ব্রয়লার (Broiler)</option>
                        <option value="কালার বার্ড">🐓 কালার বার্ড (Color Bird)</option>
                        <option value="সোনালি">🐤 সোনালি (Sonali)</option>
                        <option value="দেশি">🦆 দেশি (Deshi)</option>
                    </select>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">দিন (Day)</label>
                        <input type="text" id="day" placeholder="যেমন: 1" required class="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">ওষুধের নাম</label>
                        <input type="text" id="medicine" placeholder="যেমন: Napa" required class="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 font-bold text-teal-800">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">পরিমাণ (Amount)</label>
                        <input type="text" id="amount" placeholder="যেমন: ১ গ্রাম" required class="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                    </div>
                    <div>
                        <label class="text-xs font-bold text-gray-500 ml-1">সময় (Time)</label>
                        <select id="time" required class="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                            <option value="">বাছাই করুন</option>
                            <option value="সকাল">সকাল</option>
                            <option value="দুপুর">দুপুর</option>
                            <option value="বিকাল">বিকাল</option>
                            <option value="রাত">রাত</option>
                            <option value="সারাদিন">সারাদিন</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="text-xs font-bold text-gray-500 ml-1">বি: দ্র: (নোট)</label>
                    <input type="text" id="note" placeholder="বিশেষ কোনো নিয়ম থাকলে লিখুন" class="w-full p-4 mt-1 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>

                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-grow bg-teal-600 hover:bg-teal-700 text-white p-4 rounded-xl font-bold transition shadow-lg shadow-teal-200 flex justify-center items-center gap-2 active:scale-95">
                        <span class="material-symbols-outlined">save</span> সেভ করুন
                    </button>
                    <button type="button" onclick="resetForm()" class="bg-gray-200 hover:bg-gray-300 text-gray-700 p-4 rounded-xl font-bold transition px-6 active:scale-95">বাতিল</button>
                </div>
            </form>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
            <h2 class="text-xl font-bold text-teal-700 mb-5 flex items-center gap-2">
                <span class="material-symbols-outlined">list_alt</span> সমস্ত ওষুধের তালিকা
            </h2>
            
            <div class="flex gap-2 overflow-x-auto pb-4 mb-4 no-scrollbar border-b border-gray-100">
                <button onclick="setAdminFilter('ব্রয়লার')" data-type="broiler" class="admin-filter-btn px-5 py-2.5 rounded-full bg-teal-700 text-white text-sm font-bold whitespace-nowrap shadow-md transition">ব্রয়লার</button>
                <button onclick="setAdminFilter('কালার বার্ড')" data-type="color_bird" class="admin-filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold whitespace-nowrap transition">কালার বার্ড</button>
                <button onclick="setAdminFilter('সোনালি')" data-type="sonali" class="admin-filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold whitespace-nowrap transition">সোনালি</button>
                <button onclick="setAdminFilter('দেশি')" data-type="deshi" class="admin-filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold whitespace-nowrap transition">দেশি</button>
            </div>

            <ul id="medicineList" class="space-y-4">
                <li class="text-center py-10 text-gray-400">লোড হচ্ছে...</li>
            </ul>
        </div>

    </main>

    <script>
        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyDkqjA1Io411uidSZBLbYJlYHWGVY36zc8",
            authDomain: "shuvo-all-tools.firebaseapp.com",
            databaseURL: "https://shuvo-all-tools-default-rtdb.firebaseio.com/",
            projectId: "shuvo-all-tools",
            storageBucket: "shuvo-all-tools.appspot.com",
            messagingSenderId: "475600173705",
            appId: "1:475600173705:android:0251b1d46457dc4e806458"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // --- 1. Scrolling Text ---
        const scrollTextEl = document.getElementById("scrollText");
        const scrollInput = document.getElementById("scrollInput");
        const scrollRef = db.ref("admin_scroll_text");

        scrollRef.on("value", snapshot => {
            const text = snapshot.val() || "📌 কোন বার্তা নেই।";
            scrollTextEl.textContent = text;
            scrollInput.value = text;
        });

        document.getElementById("updateScroll").addEventListener("click", async () => {
            const newText = scrollInput.value.trim();
            if (newText) {
                await scrollRef.set(newText);
                alert("✅ Scrolling text আপডেট হয়েছে!");
            }
        });

        // --- 2. Medicine Logic & Filtering ---
        const form = document.getElementById("medicineForm");
        const list = document.getElementById("medicineList");
        let editId = null;
        const medicinesRef = db.ref("admin_medicines");
        
        let allAdminMeds = [];
        let currentAdminFilter = 'broiler'; // Default

        // Normalize Bird Type (For Safe Filtering)
        function normalizeBirdType(type) {
            if (!type) return 'broiler';
            type = String(type).trim();
            if (type.includes('ব্রয়লার') || type.includes('Broiler')) return 'broiler';
            if (type.includes('কালার') || type.includes('Color')) return 'color_bird';
            if (type.includes('সোনালি') || type.includes('Sonali')) return 'sonali';
            if (type.includes('দেশি') || type.includes('Deshi')) return 'deshi';
            return 'broiler';
        }

        // Fetch Data from Firebase
        medicinesRef.on("value", snapshot => {
            allAdminMeds = [];
            const data = snapshot.val();
            if (data) {
                Object.entries(data).forEach(([id, item]) => {
                    item.id = id;
                    item.internalBirdType = normalizeBirdType(item.birdType);
                    item.day = String(item.day || "1");
                    allAdminMeds.push(item);
                });
            }
            renderAdminList();
        });

        // Tab Switching Function
        function setAdminFilter(rawType) {
            currentAdminFilter = normalizeBirdType(rawType);
            
            // Update Tab UI
            document.querySelectorAll('.admin-filter-btn').forEach(btn => {
                if(btn.dataset.type === currentAdminFilter) {
                    btn.className = "admin-filter-btn px-5 py-2.5 rounded-full bg-teal-700 text-white text-sm font-bold whitespace-nowrap shadow-md transition";
                } else {
                    btn.className = "admin-filter-btn px-5 py-2.5 rounded-full bg-gray-100 text-gray-600 hover:bg-gray-200 text-sm font-bold whitespace-nowrap transition";
                }
            });

            renderAdminList();
        }

        // Render List based on Active Tab
        function renderAdminList() {
            list.innerHTML = "";
            const filtered = allAdminMeds.filter(m => m.internalBirdType === currentAdminFilter);

            if (filtered.length === 0) {
                list.innerHTML = `
                    <div class="text-center py-16 opacity-50 bg-gray-50 rounded-2xl border border-dashed border-gray-300">
                        <span class="material-symbols-outlined text-5xl mb-2">inventory_2</span>
                        <p class="text-sm font-medium">এই জাতের জন্য কোনো ওষুধ নেই</p>
                    </div>`;
                return;
            }

            // Sort by Serial or Day
            filtered.sort((a, b) => {
                const dayA = parseInt(a.day) || a.day.charCodeAt(0);
                const dayB = parseInt(b.day) || b.day.charCodeAt(0);
                if (dayA !== dayB) return dayA - dayB;
                return (a.serial || 0) - (b.serial || 0);
            });

            filtered.forEach(item => {
                const li = document.createElement("li");
                li.className = "p-5 border border-gray-100 rounded-2xl bg-white shadow-sm hover:shadow-md transition-all flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 group";
                li.innerHTML = `
                    <div class="flex-grow w-full">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="bg-teal-100 text-teal-800 text-xs px-2.5 py-1 rounded-md font-bold border border-teal-200">দিন: ${item.day}</span>
                            <span class="bg-blue-50 text-blue-600 text-[10px] px-2 py-1 rounded-md font-bold uppercase tracking-wider">${item.time}</span>
                            <span class="text-[10px] text-gray-400 font-bold ml-auto">Serial: #${item.serial || 1}</span>
                        </div>
                        <h4 class="font-bold text-gray-800 text-lg flex items-center gap-1">
                            <span class="material-symbols-outlined text-teal-600 text-lg">medication</span> ${item.medicine}
                        </h4>
                        <p class="text-sm text-gray-600 mt-1 font-medium">পরিমাণ: <span class="text-gray-800">${item.amount}</span></p>
                        ${item.note ? `<div class="mt-2 bg-red-50 text-red-600 text-xs p-2 rounded-lg border border-red-100 inline-block font-medium"><b>বি:দ্র:</b> ${item.note}</div>` : ""}
                    </div>
                    
                    <div class="flex sm:flex-col gap-2 w-full sm:w-auto mt-2 sm:mt-0 pt-3 sm:pt-0 border-t sm:border-t-0 border-gray-100">
                        <button class="flex-1 sm:flex-none bg-indigo-50 hover:bg-indigo-100 text-indigo-600 px-4 py-2 rounded-xl text-sm font-bold transition flex justify-center items-center gap-1" onclick="editItem('${item.id}')">
                            <span class="material-symbols-outlined text-sm">edit</span> এডিট
                        </button>
                        <button class="flex-1 sm:flex-none bg-red-50 hover:bg-red-100 text-red-500 px-4 py-2 rounded-xl text-sm font-bold transition flex justify-center items-center gap-1" onclick="deleteItem('${item.id}')">
                            <span class="material-symbols-outlined text-sm">delete</span> ডিলিট
                        </button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- 3. Form Submit & Edit Logic ---
        async function getNextSerial() {
            const snap = await medicinesRef.once("value");
            const data = snap.val();
            if (!data) return 1;
            return Math.max(...Object.values(data).map(d => d.serial || 0)) + 1;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const birdType = document.getElementById("birdType").value;
            const day = document.getElementById("day").value.trim();
            const medicine = document.getElementById("medicine").value.trim();
            const amount = document.getElementById("amount").value.trim();
            const time = document.getElementById("time").value;
            const note = document.getElementById("note").value.trim();

            if (!day || !medicine || !amount || !time) return;

            if (editId) {
                await medicinesRef.child(editId).update({ birdType, day, medicine, amount, time, note });
                editId = null;
                alert("✅ আপডেট সম্পন্ন হয়েছে!");
            } else {
                const serial = await getNextSerial();
                const newRef = medicinesRef.push();
                await newRef.set({ id: newRef.key, serial, birdType, day, medicine, amount, time, note });
                alert("🎉 নতুন ওষুধ যোগ হয়েছে!");
            }
            
            // যেই জাতের ওষুধ অ্যাড করা হলো, অটোমেটিক সেই ট্যাবে চলে যাবে
            setAdminFilter(birdType);
            resetForm();
        });

        async function editItem(id) {
            const item = allAdminMeds.find(m => m.id === id);
            if (!item) return;

            document.getElementById("birdType").value = item.birdType || "ব্রয়লার";
            document.getElementById("day").value = item.day;
            document.getElementById("medicine").value = item.medicine;
            document.getElementById("amount").value = item.amount;
            document.getElementById("time").value = item.time;
            document.getElementById("note").value = item.note || "";

            editId = id;
            document.getElementById('form-title').innerHTML = '<span class="material-symbols-outlined text-indigo-500 text-2xl">edit</span> ওষুধ আপডেট করুন';
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        async function deleteItem(id) {
            if (confirm("⚠️ আপনি কি নিশ্চিত এই ওষুধটি ডিলিট করতে চান?")) {
                await medicinesRef.child(id).remove();
            }
        }

        function resetForm() {
            editId = null;
            document.forms["medicineForm"].reset();
            document.getElementById("birdType").value = "ব্রয়লার"; 
            document.getElementById('form-title').innerHTML = '<span class="material-symbols-outlined text-2xl">add_circle</span> নতুন ওষুধ যোগ করুন';
        }
    </script>
</body>
</html>
